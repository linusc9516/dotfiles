# ─── General Settings ───────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 10000
set -g focus-events on

# ─── Prefix key (Ctrl+a) ────────────────────────────
# Caps Lock is now permanent Control – effortless prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Splitting panes ────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"   # vertical (side‑by‑side)
bind s split-window -v -c "#{pane_current_path}"   # horizontal (top‑bottom)

# ─── Pane navigation (vim keys) ─────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane resizing (prefix + H/J/K/L) ──────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window management ──────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind w choose-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind x kill-pane
bind & kill-window

# ─── Copy mode (vi keys) ────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Clipboard integration ──────────────────────────
# macOS / Linux‑WSL auto‑detection
if-shell 'uname | grep -q Darwin' {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"
}
if-shell 'uname | grep -q Linux' {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
    bind p run "powershell.exe -command Get-Clipboard | tmux load-buffer - && tmux paste-buffer"
}

# ─── Reload config ──────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# ─── Status bar tweaks (optional) ───────────────────
set -g status-left-length 30
set -g status-right-length 60

# ═══════════════════════════════════════════════════════
# TPM – Tmux Plugin Manager
# ═══════════════════════════════════════════════════════

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                    # TPM itself
set -g @plugin 'tmux-plugins/tmux-sensible'          # Sane defaults nobody should live without
set -g @plugin 'tmux-plugins/tmux-resurrect'         # Save/restore tmux sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'         # Auto‑save & auto‑restore (uses resurrect)
set -g @plugin 'tmux-plugins/tmux-yank'              # System clipboard integration (enhances our bindings)
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # Shows when prefix is active in the status bar

# Optional: if you want a nicer status bar, uncomment:
# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavour 'mocha'

# ═══════════════════════════════════════════════════════
# Plugin configuration
# ═══════════════════════════════════════════════════════

# tmux-resurrect: save/restore shell commands, vim sessions, etc.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh'

# tmux-continuum: auto‑save every 15 minutes, restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank: use system clipboard (pbcopy / clip.exe already handled above,
# but this plugin adds mouse‑based yanking and better integration)
set -g @yank_action 'copy-pipe'

# ═══════════════════════════════════════════════════════
# Initialize TPM (must be the very last line)
# ═══════════════════════════════════════════════════════
run '~/.tmux/plugins/tpm/tpm'