name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 6"
jobs:
  test:
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: 1
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "macos-latest", "windows-latest"]
        python:
          - "3.7"
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "pypy-3.10"
        include:
          - python: "3.7"
            hatch_version: "1.16.4"
        exclude:
          - os: "macos-latest"
            python: "3.7"
          - os: "windows-latest"
            python: "3.7"
          - os: "windows-latest"
            python: "pypy-3.10"
    runs-on: ${{ matrix.os }}
    name: "Test: Python ${{ matrix.python }} on ${{ matrix.os }}"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: pypa/hatch@install
        with:
          version: ${{ matrix.hatch_version || 'latest' }}
      - run: hatch test -v --cover --include python=$(echo ${{ matrix.python }} | tr -d '-') tests
      - run: hatch run coverage:xml
      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
  typecheck:
    name: Type check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: pypa/hatch@install
      - run: hatch run types:check
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: pypa/hatch@install
      - run: hatch check fmt
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: pypa/hatch@install
      - run: hatch check code
  changelog:
    name: Check changelog
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: pypa/hatch@install
      - run: hatch run python .ci/check-changelog.py --changelog CHANGELOG.md
